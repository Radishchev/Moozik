<!DOCTYPE html>
<html>
<head>

<title>Moozik Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2 class="logo">Moozik</h2>

<h3>Login</h3>

<form id="loginForm">

<div class="form-group">
<label>Username</label>
<input id="loginUsername" required>
</div>

<div class="form-group">
<label>Password</label>
<input id="loginPassword" type="password" required>
</div>

<div id="loginError" class="form-error"></div>

<button class="btn-primary btn-full" type="submit">
Login
</button>

</form>

<hr>

<h3>Create Account</h3>

<form id="registerForm">

<div class="form-group">
<label>Username</label>
<input id="regUsername" required>
</div>

<div class="form-group">
<label>Email</label>
<input id="regEmail" required>
</div>

<div class="form-group">
<label>Password</label>
<input id="regPassword" type="password" required>
</div>

<div id="registerError" class="form-error"></div>

<button class="btn-primary btn-full" type="submit">
Register
</button>

</form>

</div>

</div>

<script>

async function handleLogin(e){
e.preventDefault()

const username=document.getElementById("loginUsername").value
const password=document.getElementById("loginPassword").value

const res = await fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

const data=await res.json()

if(!res.ok){
document.getElementById("loginError").innerText=data.error
return
}

localStorage.setItem("token",data.token)

window.location="/chat"
}

async function handleRegister(e){
e.preventDefault()

const username=document.getElementById("regUsername").value
const email=document.getElementById("regEmail").value
const password=document.getElementById("regPassword").value

const res = await fetch("/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,email,password})
})

const data=await res.json()

if(!res.ok){
document.getElementById("registerError").innerText=data.error
return
}

localStorage.setItem("token",data.token)

window.location="/chat"
}

document.getElementById("loginForm").addEventListener("submit",handleLogin)
document.getElementById("registerForm").addEventListener("submit",handleRegister)

</script>

</body>
</html>
