<!DOCTYPE html>
<html>
<head>

<title>Moozik Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-header">
<h2 class="logo">Moozik</h2>
<p class="auth-subtitle">Share your music moments</p>
</div>

<div class="auth-tabs">
<button class="auth-tab active" data-tab="login">Login</button>
<button class="auth-tab" data-tab="register">Register</button>
</div>

<form id="loginForm" class="auth-form active">

<div class="form-group">
<label>Username</label>
<input id="loginUsername" required>
</div>

<div class="form-group">
<label>Password</label>
<input id="loginPassword" type="password" required>
</div>

<div id="loginError" class="form-error"></div>

<button class="btn-primary btn-full" type="submit">
Login
</button>

<div class="divider">
<span>or continue with</span>
</div>

<button type="button" class="btn-google">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="12" cy="12" r="10"></circle>
</svg>
Google
</button>

<div class="auth-footer">
New to Moozik? <a href="#" class="switch-tab" data-tab="register">Create account</a>
</div>

</form>

<form id="registerForm" class="auth-form">

<div class="form-group">
<label>Username</label>
<input id="regUsername" required>
</div>

<div class="form-group">
<label>Email</label>
<input id="regEmail" required>
</div>

<div class="form-group">
<label>Password</label>
<input id="regPassword" type="password" required>
</div>

<div id="registerError" class="form-error"></div>

<button class="btn-primary btn-full" type="submit">
Create Account
</button>

<div class="divider">
<span>or continue with</span>
</div>

<button type="button" class="btn-google">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="12" cy="12" r="10"></circle>
</svg>
Google
</button>

<div class="auth-footer">
Already have an account? <a href="#" class="switch-tab" data-tab="login">Login</a>
</div>

</form>

</div>

</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script>
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    const tabName = this.getAttribute('data-tab');
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    this.classList.add('active');
    document.getElementById(tabName + 'Form').classList.add('active');
  });
});

document.querySelectorAll('.switch-tab').forEach(link => {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    const tabName = this.getAttribute('data-tab');
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
    document.getElementById(tabName + 'Form').classList.add('active');
  });
});
</script>

</body>
</html>
