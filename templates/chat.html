<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Moozik Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">

<style>
.player #title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-top: 8px;
  margin-bottom: 4px;
}

.player #status {
  font-size: 12px;
  color: var(--text-2);
}

.message {
  padding: 12px 16px;
  border-radius: 10px;
  background: var(--surface);
  border-left: 3px solid var(--text-3);
  font-size: 14px;
  line-height: 1.5;
  max-width: 70%;
  word-wrap: break-word;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message:hover {
  background: var(--surface-2);
}

.message-system {
  align-self: center;
  background: transparent;
  border: none;
  color: var(--text-3);
  font-size: 12px;
  text-align: center;
}
</style>

</head>

<body>

<div class="app">

<main class="main">

<header class="topbar">
<div class="room-title">{{ room_name }}</div>
<button id="logoutBtn" class="topbar-logout" type="button">Logout</button>
</header>

<div class="layout">

<div class="player">

<img id="cover" style="background: var(--surface-2);">

<div id="title">No song playing</div>
<div id="status">Waiting for a song...</div>

<input type="range" id="seek">

<div class="time">
<span id="curTime">0:00</span>
<span id="durTime">0:00</span>
</div>

<div class="volume-control">
<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="volume-icon">
<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
</svg>
<input type="range" id="volumeControl" min="0" max="100" value="70">
</div>

</div>

<div class="chat">

<div id="chat" class="messages"></div>

<div class="chat-input-row">

<input id="msgInput" placeholder="Type !play or chat..." autocomplete="off">

<button id="sendBtn">Send</button>

</div>

</div>

</div>

</main>

</div>

<script>
const room = "{{ room_code }}"
</script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- IMPORTANT ORDER -->
<script src="{{ url_for('static', filename='js/player.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/socketHandler.js') }}"></script>

</body>
</html>
