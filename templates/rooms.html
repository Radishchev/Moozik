<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Moozik Rooms</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

<style>

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  padding:0;
}

.container{
  max-width:1000px;
  margin:0 auto;
  padding:40px 20px;
}

.page-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:40px;
}

.page-title{
  font-family:var(--font-display);
  font-size:36px;
  font-weight:800;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
}

.section{
  margin-bottom:40px;
}

.section-title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:700;
  margin-bottom:16px;
  color:var(--text);
}

.section-subtitle{
  color:var(--text-3);
  font-size:13px;
  margin-bottom:12px;
}

.form-row{
  display:flex;
  gap:12px;
  align-items:flex-end;
  flex-wrap:wrap;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.form-group label{
  font-size:13px;
  font-weight:600;
  color:var(--text);
}

.form-group input{
  padding:12px 14px;
  background:var(--bg-3);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  transition:var(--transition);
}

.form-group input::placeholder{
  color:var(--text-3);
}

.form-group input:focus{
  border-color:var(--accent);
  outline:none;
  background:rgba(255, 77, 109, 0.05);
  box-shadow:0 0 0 3px rgba(255, 77, 109, 0.1);
}

.checkbox-group{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 0;
}

.checkbox-group input[type="checkbox"]{
  width:18px;
  height:18px;
  cursor:pointer;
  accent-color:var(--accent);
}

.checkbox-group label{
  cursor:pointer;
  margin:0;
}

.rooms-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
}

.room{
  padding:20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:var(--transition);
}

.room:hover{
  border-color:var(--accent);
  box-shadow:0 8px 20px rgba(255, 77, 109, 0.15);
  transform:translateY(-2px);
  background:var(--surface-2);
}

.room-name{
  font-family:var(--font-display);
  font-size:16px;
  font-weight:700;
  color:var(--text);
}

.room-info{
  font-size:13px;
  color:var(--text-3);
  display:flex;
  gap:12px;
}

.room-action{
  display:flex;
  gap:8px;
}

.room-action button{
  flex:1;
  padding:10px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  transition:var(--transition);
}

.btn-join{
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  color:white;
}

.btn-join:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(255, 77, 109, 0.3);
}

.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--text-3);
}

.empty-state-icon{
  font-size:48px;
  margin-bottom:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="page-header">
<h1 class="page-title">Moozik Rooms</h1>
</div>

<div class="section">
<h2 class="section-title">Create Room</h2>
<div class="form-row">
<div class="form-group" style="flex:1; min-width:200px;">
<label>Room name</label>
<input id="roomName" placeholder="Enter a catchy name…" autocomplete="off">
</div>
<div class="checkbox-group">
<input type="checkbox" id="privateRoom">
<label for="privateRoom">Private room</label>
</div>
<button class="btn-primary" onclick="createRoom()">Create Room</button>
</div>
</div>

<div class="section">
<h2 class="section-title">Join Private Room</h2>
<p class="section-subtitle">Enter the invite code shared by a room owner</p>
<div class="form-row">
<div class="form-group" style="flex:1; min-width:200px;">
<input id="inviteCode" placeholder="Enter invite code" autocomplete="off">
</div>
<button class="btn-primary" onclick="joinPrivate()">Join Room</button>
</div>
</div>

<div class="section">
<h2 class="section-title">Public Rooms</h2>
<div id="roomsList" class="rooms-grid"></div>
<div id="emptyState" class="empty-state">
<div class="empty-state-icon">♫</div>
<p>No public rooms available. Create one to get started!</p>
</div>
</div>

</div>

<script src="{{ url_for('static', filename='js/rooms.js') }}"></script>

</body>
</html>
